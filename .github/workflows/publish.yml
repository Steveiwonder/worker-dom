# Publishing requires an `NPM_TOKEN` repository secret (Settings > Secrets and
# variables > Actions) with publish rights to the "worker-vdom" package.
# Without it, the publish step cannot authenticate to the npm registry.
name: Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check whether this version is already published
        id: version_check
        run: |
          LOCAL_VERSION="$(node -p "require('./package.json').version")"
          echo "Local package.json version: ${LOCAL_VERSION}"
          PUBLISHED_VERSION="$(npm view "worker-vdom@${LOCAL_VERSION}" version 2>/dev/null || true)"
          if [ "${PUBLISHED_VERSION}" = "${LOCAL_VERSION}" ]; then
            echo "Version ${LOCAL_VERSION} is already published on npm. Skipping publish."
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Version ${LOCAL_VERSION} is not published yet. Proceeding with publish."
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
