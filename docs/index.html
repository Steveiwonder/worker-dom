<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>worker-vdom &middot; API Reference</title>
<meta name="description" content="API reference for worker-vdom, a lightweight, dependency-free virtual DOM for Web Workers." />
<style>
  /* ---------- Theme tokens ---------- */
  :root {
    --bg: #ffffff;
    --bg-soft: #f7f8fa;
    --bg-sunken: #f1f2f6;
    --surface: #ffffff;
    --border: #e4e6ec;
    --border-strong: #d3d6e0;
    --text: #1c2030;
    --text-soft: #565d73;
    --text-faint: #868da3;
    --accent: #5b4be6;
    --accent-soft: #efecff;
    --accent-text: #4a3bd6;
    --code-bg: #f5f4fb;
    --code-border: #e6e3f5;
    --shadow: 0 1px 2px rgba(20, 22, 40, .06), 0 8px 24px rgba(20, 22, 40, .06);
    /* syntax */
    --syn-key: #a626a4;
    --syn-str: #328a3f;
    --syn-com: #9aa0b0;
    --syn-num: #b26a00;
    --syn-api: #4a3bd6;
    --scroll-margin: 84px;
  }
  :root[data-theme="dark"], :root.__dark {
    --bg: #0f1117;
    --bg-soft: #151824;
    --bg-sunken: #1a1e2c;
    --surface: #161a26;
    --border: #262b3d;
    --border-strong: #333a52;
    --text: #e7e9f0;
    --text-soft: #a5adc4;
    --text-faint: #6f7690;
    --accent: #8b7dff;
    --accent-soft: #221f3d;
    --accent-text: #b3a9ff;
    --code-bg: #12141f;
    --code-border: #262b3d;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
    --syn-key: #c792ea;
    --syn-str: #8bd49c;
    --syn-com: #6b7288;
    --syn-num: #f0a35e;
    --syn-api: #9db4ff;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #0f1117;
      --bg-soft: #151824;
      --bg-sunken: #1a1e2c;
      --surface: #161a26;
      --border: #262b3d;
      --border-strong: #333a52;
      --text: #e7e9f0;
      --text-soft: #a5adc4;
      --text-faint: #6f7690;
      --accent: #8b7dff;
      --accent-soft: #221f3d;
      --accent-text: #b3a9ff;
      --code-bg: #12141f;
      --code-border: #262b3d;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
      --syn-key: #c792ea;
      --syn-str: #8bd49c;
      --syn-com: #6b7288;
      --syn-num: #f0a35e;
      --syn-api: #9db4ff;
    }
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent-text); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code, pre, .mono { font-family: "SF Mono", ui-monospace, "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace; }

  /* ---------- Header ---------- */
  header.top {
    position: sticky; top: 0; z-index: 40;
    display: flex; align-items: center; gap: 14px;
    height: 60px; padding: 0 20px;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: saturate(160%) blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 11px; font-weight: 700; font-size: 16px; letter-spacing: -.01em; color: var(--text); }
  .brand:hover { text-decoration: none; }
  .brand .logo {
    width: 30px; height: 30px; border-radius: 8px; flex: none;
    display: grid; place-items: center;
    background: linear-gradient(140deg, var(--accent), #8b7dff);
    color: #fff; font-size: 15px; box-shadow: 0 2px 8px rgba(91,75,230,.35);
  }
  .brand .ver {
    font-size: 11px; font-weight: 600; color: var(--accent-text);
    background: var(--accent-soft); padding: 2px 7px; border-radius: 999px;
  }
  .top .spacer { flex: 1; }
  .top .tagline { color: var(--text-faint); font-size: 13px; font-weight: 500; }
  @media (max-width: 720px) { .top .tagline { display: none; } }
  .icon-btn {
    display: grid; place-items: center;
    width: 38px; height: 38px; border-radius: 9px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-soft);
    cursor: pointer; transition: background .15s, color .15s, border-color .15s;
  }
  .icon-btn:hover { background: var(--bg-sunken); color: var(--text); }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn svg { width: 18px; height: 18px; }
  #menuBtn { display: none; }
  @media (max-width: 900px) { #menuBtn { display: grid; } }

  /* ---------- Layout ---------- */
  .layout { display: flex; align-items: flex-start; }
  nav.sidebar {
    position: sticky; top: 60px; align-self: flex-start;
    width: 288px; flex: none;
    height: calc(100vh - 60px);
    overflow-y: auto;
    border-right: 1px solid var(--border);
    background: var(--bg-soft);
    padding: 18px 14px 60px;
  }
  .search-wrap { position: sticky; top: 0; z-index: 2; background: var(--bg-soft); padding-bottom: 12px; margin-bottom: 4px; }
  .search-box { position: relative; }
  .search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text-faint); pointer-events: none; }
  #search {
    width: 100%; padding: 9px 30px 9px 33px;
    border: 1px solid var(--border-strong); border-radius: 9px;
    background: var(--surface); color: var(--text); font-size: 14px;
  }
  #search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  #searchClear {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    border: none; background: none; color: var(--text-faint); cursor: pointer;
    font-size: 17px; line-height: 1; padding: 4px; border-radius: 6px; display: none;
  }
  #searchClear:hover { color: var(--text); background: var(--bg-sunken); }

  .nav-group { margin-top: 14px; }
  .nav-group > .nav-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
    color: var(--text-faint); padding: 4px 10px; margin-bottom: 2px;
  }
  .nav-link {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 8px;
    color: var(--text-soft); font-size: 14px; font-weight: 500;
    cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .nav-link:hover { background: var(--bg-sunken); color: var(--text); text-decoration: none; }
  .nav-link.active { background: var(--accent-soft); color: var(--accent-text); font-weight: 600; }
  .nav-link .kbadge {
    font-size: 10px; font-weight: 700; width: 17px; height: 17px; flex: none;
    display: grid; place-items: center; border-radius: 5px;
    background: var(--bg-sunken); color: var(--text-faint);
  }
  .nav-link.active .kbadge { background: var(--accent); color: #fff; }
  .nav-empty { padding: 20px 10px; color: var(--text-faint); font-size: 13px; display: none; }

  /* ---------- Main ---------- */
  main {
    flex: 1; min-width: 0;
    padding: 40px clamp(20px, 5vw, 64px) 120px;
    max-width: 940px;
  }
  section.symbol { scroll-margin-top: var(--scroll-margin); margin-bottom: 64px; }
  section.symbol.hidden, .member.hidden { display: none; }

  .hero { margin-bottom: 44px; scroll-margin-top: var(--scroll-margin); }
  .hero h1 { font-size: clamp(30px, 5vw, 42px); line-height: 1.1; letter-spacing: -.025em; margin: 8px 0 14px; }
  .hero .lede { font-size: 18px; color: var(--text-soft); max-width: 660px; }
  .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--accent-text); }

  .sym-head { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 6px; scroll-margin-top: var(--scroll-margin); }
  .sym-head h2 { font-size: 27px; letter-spacing: -.02em; margin: 0; }
  .sym-kind {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border-strong); color: var(--text-soft);
  }
  .sym-kind.k-function { color: #0a7d5a; border-color: #a7e0cd; background: #e9f9f2; }
  .sym-kind.k-class { color: #6a4bd6; border-color: #d3caf7; background: #efecff; }
  .sym-kind.k-constant { color: #b26a00; border-color: #f0d6a8; background: #fdf3e2; }
  .sym-kind.k-type { color: #1f6feb; border-color: #b9d3f7; background: #e8f1fe; }
  :root[data-theme="dark"] .sym-kind.k-function, :root.__dark .sym-kind.k-function { color: #6ee0b0; border-color: #1f5a44; background: #0f2a20; }
  :root[data-theme="dark"] .sym-kind.k-class, :root.__dark .sym-kind.k-class { color: #b3a9ff; border-color: #3a3470; background: #1e1a38; }
  :root[data-theme="dark"] .sym-kind.k-constant, :root.__dark .sym-kind.k-constant { color: #f0b878; border-color: #5a4420; background: #2a2010; }
  :root[data-theme="dark"] .sym-kind.k-type, :root.__dark .sym-kind.k-type { color: #8ab4f8; border-color: #2a4570; background: #12233d; }

  .extends-note { font-size: 13px; color: var(--text-faint); margin: 0 0 14px; }
  .extends-note code { color: var(--accent-text); }
  .sym-desc { color: var(--text-soft); font-size: 15.5px; margin: 10px 0 22px; max-width: 720px; }
  .sym-desc p { margin: 0 0 10px; }
  .sym-desc code, .member-desc code, .extends-note code, .callout code, .members-title code {
    background: var(--code-bg); border: 1px solid var(--code-border);
    padding: 1px 5px; border-radius: 5px; font-size: .88em; color: var(--text);
  }

  .sig-block {
    font-size: 14px; background: var(--code-bg); border: 1px solid var(--code-border);
    border-radius: 10px; padding: 13px 15px; margin: 0 0 22px; overflow-x: auto; line-height: 1.7;
  }

  .members-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); margin: 26px 0 12px; }

  .member {
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface); margin-bottom: 12px; overflow: hidden;
    scroll-margin-top: var(--scroll-margin);
  }
  .member-head { display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px 10px; padding: 14px 16px 4px; }
  .member-name { font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace; font-weight: 600; font-size: 15px; color: var(--text); }
  .badge {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    padding: 2px 7px; border-radius: 6px; line-height: 1.4;
  }
  .badge.b-method { background: #e8f1fe; color: #1f6feb; }
  .badge.b-property { background: #e9f9f2; color: #0a7d5a; }
  .badge.b-getter { background: #f3ecff; color: #7a4bd6; }
  .badge.b-setter { background: #fdeef5; color: #c23b7e; }
  .badge.b-static { background: #fdf3e2; color: #b26a00; }
  .badge.b-readonly { background: var(--bg-sunken); color: var(--text-faint); }
  :root[data-theme="dark"] .badge.b-method, :root.__dark .badge.b-method { background: #12233d; color: #8ab4f8; }
  :root[data-theme="dark"] .badge.b-property, :root.__dark .badge.b-property { background: #0f2a20; color: #6ee0b0; }
  :root[data-theme="dark"] .badge.b-getter, :root.__dark .badge.b-getter { background: #221a38; color: #c19bff; }
  :root[data-theme="dark"] .badge.b-setter, :root.__dark .badge.b-setter { background: #33162a; color: #f08ac0; }
  :root[data-theme="dark"] .badge.b-static, :root.__dark .badge.b-static { background: #2a2010; color: #f0b878; }

  .member-sig { padding: 0 16px 4px; }
  .member-sig code { font-size: 13px; color: var(--text-soft); }
  .member-desc { padding: 6px 16px 16px; color: var(--text-soft); font-size: 14.5px; }
  .member-desc p { margin: 0 0 8px; }
  .member-desc p:last-child { margin-bottom: 0; }

  /* ---------- Code blocks ---------- */
  .code-wrap { position: relative; margin: 18px 0 22px; }
  pre.code {
    margin: 0; background: var(--code-bg); border: 1px solid var(--code-border);
    border-radius: 12px; padding: 16px 18px; overflow-x: auto;
    font-size: 13.5px; line-height: 1.65;
  }
  pre.code code { white-space: pre; }
  .copy-btn {
    position: absolute; top: 9px; right: 9px;
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600;
    padding: 5px 9px; border-radius: 7px;
    border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-soft);
    cursor: pointer; opacity: 0; transition: opacity .15s, background .15s, color .15s;
  }
  .code-wrap:hover .copy-btn, .copy-btn:focus-visible { opacity: 1; }
  .copy-btn:hover { background: var(--bg-sunken); color: var(--text); }
  .copy-btn.copied { color: #0a7d5a; border-color: #a7e0cd; }
  :root[data-theme="dark"] .copy-btn.copied, :root.__dark .copy-btn.copied { color: #6ee0b0; border-color: #1f5a44; }
  .copy-btn svg { width: 13px; height: 13px; }

  /* syntax tokens */
  .tok-key { color: var(--syn-key); }
  .tok-str { color: var(--syn-str); }
  .tok-com { color: var(--syn-com); font-style: italic; }
  .tok-num { color: var(--syn-num); }
  .tok-api { color: var(--syn-api); font-weight: 600; }

  /* ---------- Callout ---------- */
  .callout {
    border: 1px solid var(--border); border-left: 3px solid var(--accent);
    background: var(--bg-soft); border-radius: 10px; padding: 15px 18px; margin: 22px 0;
    font-size: 14.5px; color: var(--text-soft);
  }
  .callout strong { color: var(--text); }
  .callout .callout-title { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .callout ul { margin: 8px 0 0; padding-left: 20px; }
  .callout li { margin: 3px 0; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .pill { font-size: 12.5px; font-weight: 500; padding: 3px 10px; border-radius: 999px; background: var(--bg-sunken); color: var(--text-soft); border: 1px solid var(--border); }
  .pill.no { text-decoration: line-through; color: var(--text-faint); }

  /* constants + types tables */
  .const-table { width: 100%; border-collapse: collapse; font-size: 14px; margin: 4px 0 22px; display: block; overflow-x: auto; }
  .const-table th, .const-table td { text-align: left; padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .const-table thead th { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); border-bottom: 1px solid var(--border-strong); white-space: nowrap; }
  .const-table td code { background: var(--code-bg); border: 1px solid var(--code-border); padding: 1px 6px; border-radius: 5px; font-size: 12.5px; white-space: nowrap; }
  .const-table td.desc { color: var(--text-soft); }

  footer {
    border-top: 1px solid var(--border); margin-top: 40px;
    padding: 28px clamp(20px, 5vw, 64px);
    color: var(--text-faint); font-size: 13.5px;
  }
  footer a { color: var(--text-soft); }

  /* ---------- Interactive: playground + benchmarks ---------- */
  .pg-presets { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 14px; }
  .pg-preset {
    font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 8px;
    border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-soft); cursor: pointer;
  }
  .pg-preset:hover { background: var(--bg-sunken); color: var(--text); }
  .pg-preset:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  textarea.pg-code {
    width: 100%; min-height: 240px; resize: vertical; display: block;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 13.5px; line-height: 1.6; padding: 15px 16px; tab-size: 2;
    border: 1px solid var(--code-border); border-radius: 12px 12px 0 0;
    background: var(--code-bg); color: var(--text);
  }
  textarea.pg-code:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .pg-toolbar {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border: 1px solid var(--code-border); border-top: none; border-radius: 0 0 12px 12px; background: var(--bg-soft);
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 600;
    padding: 8px 16px; border-radius: 9px; border: 1px solid transparent;
    background: var(--accent); color: #fff; cursor: pointer;
  }
  .btn-primary:hover { filter: brightness(1.07); }
  .btn-primary:disabled { opacity: .55; cursor: progress; }
  .btn-primary:focus-visible, .btn-ghost:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-primary svg { width: 15px; height: 15px; }
  .btn-ghost {
    font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 9px;
    border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-soft); cursor: pointer;
  }
  .btn-ghost:hover { background: var(--bg-sunken); color: var(--text); }
  .io-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); margin: 18px 0 8px; }
  pre.pg-output {
    margin: 0; min-height: 64px; background: var(--code-bg); border: 1px solid var(--code-border);
    border-radius: 12px; padding: 14px 16px; overflow-x: auto;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: var(--text);
  }
  pre.pg-output .log { color: var(--text); }
  pre.pg-output .err { color: #d13438; }
  pre.pg-output .muted { color: var(--text-faint); }
  :root[data-theme="dark"] pre.pg-output .err, :root.__dark pre.pg-output .err { color: #ff7b72; }

  .bm-controls { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin: 4px 0 16px; }
  .bm-controls label { font-size: 14px; color: var(--text-soft); font-weight: 500; }
  .bm-controls input {
    width: 118px; padding: 8px 10px; border: 1px solid var(--border-strong);
    border-radius: 8px; background: var(--surface); color: var(--text); font-size: 14px;
  }
  .bm-controls input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .bm-status { font-size: 13.5px; color: var(--text-soft); min-height: 22px; margin: 4px 0 10px; display: flex; align-items: center; gap: 9px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; flex: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .bm-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; }
  .bm-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .bm-table th, .bm-table td { text-align: left; padding: 10px 13px; border-bottom: 1px solid var(--border); }
  .bm-table tr:last-child td { border-bottom: none; }
  .bm-table thead th { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); background: var(--bg-soft); }
  .bm-table td.op { font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; color: var(--text); white-space: nowrap; }
  .bm-table td.num { text-align: right; font-variant-numeric: tabular-nums; font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace; color: var(--text-soft); white-space: nowrap; }
  .bm-bar-cell { width: 24%; min-width: 110px; }
  .bm-bar-track { background: var(--bg-sunken); border-radius: 6px; height: 9px; overflow: hidden; }
  .bm-bar-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), #8b7dff); border-radius: 6px; transition: width .35s ease; }
  .bm-row-running td { opacity: .5; }
  @media (prefers-reduced-motion: reduce) { .bm-bar-fill { transition: none; } .spinner { animation: none; } }

  /* ---------- Mobile sidebar ---------- */
  .backdrop { display: none; }
  @media (max-width: 900px) {
    nav.sidebar {
      position: fixed; top: 60px; left: 0; z-index: 35;
      transform: translateX(-100%); transition: transform .22s ease;
      box-shadow: var(--shadow); width: 300px;
    }
    body.nav-open nav.sidebar { transform: translateX(0); }
    body.nav-open .backdrop {
      display: block; position: fixed; inset: 60px 0 0 0; z-index: 30;
      background: rgba(10,12,20,.4);
    }
    main { padding-top: 28px; }
  }

  /* Skip link */
  .skip-link {
    position: absolute; left: -999px; top: 8px; z-index: 100;
    background: var(--accent); color: #fff; padding: 8px 14px; border-radius: 8px;
  }
  .skip-link:focus { left: 12px; }
</style>
</head>
<body>

function badgeFor(mem){
  var out = "";
  if (mem.k === "method") out += '<span class="badge b-method">method</span>';
  else if (mem.k === "property") out += '<span class="badge b-property">property</span>';
  else if (mem.k === "getter") { out += '<span class="badge b-getter">getter</span>'; if (mem.setter) out += '<span class="badge b-setter">setter</span>'; }
  else if (mem.k === "static-method") out += '<span class="badge b-static">static</span><span class="badge b-method">method</span>';
  if (mem.ro) out += '<span class="badge b-readonly">readonly</span>';
  return out;
}

function renderMember(sym, mem){
  var mid = sym.id + "__" + mem.name.replace(/[^\w]+/g, "_");
  var search = (mem.name + " " + mem.sig + " " + mem.desc).toLowerCase();
  return '<div class="member" id="' + mid + '" data-search="' + escapeHtml(search) + '">' +
    '<div class="member-head">' +
      '<span class="member-name">' + escapeHtml(mem.name) + '</span>' +
      badgeFor(mem) +
    '</div>' +
    '<div class="member-sig"><code>' + highlight(mem.sig) + '</code></div>' +
    '<div class="member-desc"><p>' + mem.desc + '</p></div>' +
  '</div>';
}

function renderConstTable(t){
  var h = '<table class="const-table"><thead><tr>';
  t.head.forEach(function(c){ h += '<th>' + c + '</th>'; });
  h += '</tr></thead><tbody>';
  t.rows.forEach(function(r){
    h += '<tr>';
    r.forEach(function(cell, i){
      if (i === 0) h += '<td><code>' + cell + '</code></td>';
      else if (t.head[i] === "Value") h += '<td><code>' + cell + '</code></td>';
      else if (t.head[i] === "URI") h += '<td><code>' + cell + '</code></td>';
      else if (t.head[i] === "Used by" && cell.indexOf("V") === 0) h += '<td><code>' + cell + '</code></td>';
      else h += '<td class="desc">' + cell + '</td>';
    });
    h += '</tr>';
  });
  return h + '</tbody></table>';
}

function renderTypeList(list){
  var h = "";
  list.forEach(function(t){
    var name = t[0], sig = t[1], desc = t[2];
    var search = (name + " " + sig + " " + desc).toLowerCase();
    h += '<div class="member" data-search="' + escapeHtml(search) + '">' +
      '<div class="member-head"><span class="member-name">' + name + '</span><span class="badge b-property">type</span></div>' +
      '<div class="member-sig"><code>' + highlight(sig) + '</code></div>' +
      '<div class="member-desc"><p>' + desc + '</p></div>' +
    '</div>';
  });
  return h;
}

})();

      for (let i = n._childNodes.length - 1; i >= 0; i--) {
        stack.push(n._childNodes[i]);
      }
    }
    return null;
  }
  querySelector(selector) {
    return querySelector(this, selector);
  }
  querySelectorAll(selector) {
    return querySelectorAll(this, selector);
  }
  // --- Cloning -------------------------------------------------------------
  _shallowClone() {
    const clone = new _VDocument(this.mode);
    return clone;
  }
};
function createDocument(options = {}) {
  const mode = options.mode ?? "html";
  const doc = new VDocument(mode);
  if (mode === "html") {
    const doctype = doc.createDocumentType("html");
    doc.appendChild(doctype);
    const html = doc.createElement("html");
    const head = doc.createElement("head");
    const body = doc.createElement("body");
    html.appendChild(head);
    html.appendChild(body);
    doc.appendChild(html);
  }
  return doc;
}
window.WVDOM = {
  ATTRIBUTE_NODE,
  CDATA_SECTION_NODE,
  COMMENT_NODE,
  DOCUMENT_FRAGMENT_NODE,
  DOCUMENT_NODE,
  DOCUMENT_TYPE_NODE,
  DOMException,
  DOMTokenList,
  ELEMENT_NODE,
  HTML_NS,
  MATHML_NS,
  PROCESSING_INSTRUCTION_NODE,
  SVG_NS,
  TEXT_NODE,
  VCharacterData,
  VComment,
  VDocument,
  VDocumentFragment,
  VDocumentType,
  VElement,
  VNode,
  VText,
  XLINK_NS,
  XMLNS_NS,
  XML_NS,
  createDocument,
  parseFragment,
  serialize,
  serializeHTML,
  serializeXML
};

/* === interactive glue === */
/* ============================================================
   Interactive glue — runs the REAL bundled worker-vdom above.
   window.WVDOM holds every public export. Everything below runs
   in-browser with zero network access.
   ============================================================ */
(function interactive(){
  var L = window.WVDOM;
  if (!L) { console.error("worker-vdom bundle failed to initialize"); return; }
  var esc = window.escapeHtml || function(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); };

  var SCOPE = ["createDocument","serialize","serializeHTML","serializeXML","parseFragment",
    "VDocument","VNode","VElement","VText","VComment","VCharacterData","VDocumentFragment",
    "VDocumentType","DOMTokenList","DOMException",
    "ELEMENT_NODE","ATTRIBUTE_NODE","TEXT_NODE","CDATA_SECTION_NODE","PROCESSING_INSTRUCTION_NODE",
    "COMMENT_NODE","DOCUMENT_NODE","DOCUMENT_TYPE_NODE","DOCUMENT_FRAGMENT_NODE",
    "HTML_NS","SVG_NS","MATHML_NS","XML_NS","XMLNS_NS","XLINK_NS"];

  function fmt(v){
    if (typeof v === "string") return v;
    if (v === null) return "null";
    if (v === undefined) return "undefined";
    if (typeof v === "object" && typeof v.nodeType === "number") {
      try { return L.serialize(v); } catch (e) { return "[" + (v.nodeName || "node") + "]"; }
    }
    if (typeof v === "object") {
      try { return JSON.stringify(v); } catch (e) { return String(v); }
    }
    return String(v);
  }

  /* ---------------- Playground ---------------- */
  (function playground(){
    var codeEl = document.getElementById("pg-code");
    var outEl = document.getElementById("pg-output");
    var runBtn = document.getElementById("pg-run");
    var resetBtn = document.getElementById("pg-reset");
    var presets = window.PLAYGROUND_PRESETS || [];
    if (!codeEl || !outEl || !runBtn) return;

    if (presets.length) codeEl.value = presets[0].code;

    function joinArgs(args){
      return Array.prototype.map.call(args, fmt).join(" ");
    }

    function run(){
      var logs = [];
      var sandboxConsole = {
        log:   function(){ logs.push({ t: "log", s: joinArgs(arguments) }); },
        info:  function(){ logs.push({ t: "log", s: joinArgs(arguments) }); },
        warn:  function(){ logs.push({ t: "log", s: joinArgs(arguments) }); },
        error: function(){ logs.push({ t: "err", s: joinArgs(arguments) }); },
        debug: function(){ logs.push({ t: "log", s: joinArgs(arguments) }); }
      };
      var names = SCOPE.concat(["console"]);
      var vals = SCOPE.map(function(n){ return L[n]; }).concat([sandboxConsole]);
      var result, threw = null;
      try {
        var fn = new Function(names.join(","), codeEl.value);
        result = fn.apply(null, vals);
      } catch (e) { threw = e; }

      var html = "";
      logs.forEach(function(l){
        html += '<span class="' + (l.t === "err" ? "err" : "log") + '">' + esc(l.s) + '</span>\n';
      });
      if (threw) {
        var label = (threw && threw.name ? threw.name + ": " : "Error: ");
        html += '<span class="err">' + esc(label + (threw && threw.message ? threw.message : String(threw))) + '</span>\n';
      } else if (result !== undefined) {
        html += '<span class="muted">→ returned</span>\n<span class="log">' + esc(fmt(result)) + '</span>\n';
      }
      if (!html) html = '<span class="muted">(no console output and no returned value)</span>';
      outEl.innerHTML = html;
    }

    runBtn.addEventListener("click", run);
    if (resetBtn) resetBtn.addEventListener("click", function(){
      if (presets.length) codeEl.value = presets[0].code;
      outEl.innerHTML = '<span class="muted">Press Run to execute the code above.</span>';
      codeEl.focus();
    });
    // Ctrl/Cmd+Enter to run.
    codeEl.addEventListener("keydown", function(e){
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); run(); }
    });
    // Preset buttons.
    document.querySelectorAll(".pg-preset").forEach(function(btn){
      btn.addEventListener("click", function(){
        var i = parseInt(btn.getAttribute("data-preset"), 10);
        if (presets[i]) { codeEl.value = presets[i].code; codeEl.focus(); run(); }
      });
    });
  })();

  /* ---------------- Benchmarks ---------------- */
  (function benchmarks(){
    var nInput = document.getElementById("bm-n");
    var runBtn = document.getElementById("bm-run");
    var status = document.getElementById("bm-status");
    var tbody = document.getElementById("bm-tbody");
    if (!nInput || !runBtn || !status || !tbody) return;

    function nf(n){ return Math.round(n).toLocaleString("en-US"); }
    function msf(n){ return n.toFixed(2); }

    function buildTree(n){
      var doc = L.createDocument();
      var root = doc.createElement("section");
      for (var i = 0; i < n; i++) {
        var mod = i % 6;
        var tag = mod === 0 ? "section" : mod === 1 ? "div" : mod < 4 ? "li" : "span";
        var el = doc.createElement(tag);
        if (i % 3 === 0) el.setAttribute("class", "item");
        if (i % 5 === 0) el.classList.add("odd");
        el.setAttribute("data-i", String(i));
        el.appendChild(doc.createTextNode("n" + i));
        root.appendChild(el);
      }
      return { doc: doc, root: root };
    }

    var benches = [
      { op: "createElement × N", run: function(N){
          var doc = L.createDocument();
          for (var i = 0; i < N; i++) doc.createElement("div");
          return N;
        } },
      { op: "append × N via DocumentFragment", run: function(N){
          var doc = L.createDocument();
          var frag = doc.createDocumentFragment();
          for (var i = 0; i < N; i++) frag.appendChild(doc.createElement("span"));
          var container = doc.createElement("div");
          container.appendChild(frag);
          return N;
        } },
      { op: "setAttribute × N", run: function(N){
          var doc = L.createDocument();
          var el = doc.createElement("div");
          for (var i = 0; i < N; i++) el.setAttribute("data-k" + (i % 24), "v" + i);
          return N;
        } },
      { op: "cloneNode(true) deep subtree", prep: function(N){ return buildTree(Math.min(N, 40000)); },
        run: function(N, ctx){
          var clones = Math.max(5, Math.round(N / 2000));
          for (var i = 0; i < clones; i++) ctx.root.cloneNode(true);
          return clones;
        } },
      { op: "serialize large tree", prep: function(N){ return buildTree(Math.min(N, 40000)); },
        run: function(N, ctx){
          var reps = Math.max(5, Math.round(N / 3000));
          var s = "";
          for (var i = 0; i < reps; i++) s = L.serialize(ctx.root);
          return reps;
        } },
      { op: "querySelectorAll('span')", qsa: "span" },
      { op: "querySelectorAll('.item')", qsa: ".item" },
      { op: "querySelectorAll('section li')", qsa: "section li" },
      { op: "querySelectorAll('li:nth-child(2n)')", qsa: "li:nth-child(2n)" }
    ];

    function setStatus(html){ status.innerHTML = html; }

    function run(){
      var N = parseInt(nInput.value, 10);
      if (!isFinite(N)) N = 50000;
      N = Math.max(1000, Math.min(100000, N));
      nInput.value = N;

      runBtn.disabled = true;
      tbody.innerHTML = "";
      var results = [];
      var qsaTree = null;
      var idx = 0;

      function normalize(){
        var max = 0;
        results.forEach(function(r){ if (r.ops > max) max = r.ops; });
        results.forEach(function(r){
          if (r._fill) r._fill.style.width = (max > 0 ? (r.ops / max * 100) : 0).toFixed(1) + "%";
        });
      }

      function appendRow(r){
        var tr = document.createElement("tr");
        tr.innerHTML =
          '<td class="op">' + esc(r.op) + '</td>' +
          '<td class="num">' + nf(r.iters) + '</td>' +
          '<td class="num">' + msf(r.total) + '</td>' +
          '<td class="num">' + nf(r.ops) + '</td>' +
          '<td class="bm-bar-cell"><div class="bm-bar-track"><div class="bm-bar-fill"></div></div></td>';
        tbody.appendChild(tr);
        r._fill = tr.querySelector(".bm-bar-fill");
      }

      function step(){
        if (idx >= benches.length) {
          normalize();
          runBtn.disabled = false;
          setStatus('<span style="color:var(--text-soft)">Done — N = ' + N.toLocaleString("en-US") +
            ', ' + benches.length + ' operations. Re-run for a fresh sample.</span>');
          return;
        }
        var b = benches[idx];
        setStatus('<span class="spinner" aria-hidden="true"></span><span>Running ' + (idx + 1) + '/' + benches.length +
          ': ' + esc(b.op) + ' …</span>');
        // Yield so the "running" state paints before the (blocking) work.
        setTimeout(function(){
          var ctx = null;
          if (b.qsa) { if (!qsaTree) qsaTree = buildTree(Math.min(N, 40000)); }
          else if (b.prep) { ctx = b.prep(N); }

          var iters, t0, t1;
          if (b.qsa) {
            var reps = Math.max(5, Math.round(N / 2000));
            t0 = performance.now();
            for (var i = 0; i < reps; i++) qsaTree.root.querySelectorAll(b.qsa);
            t1 = performance.now();
            iters = reps;
          } else {
            t0 = performance.now();
            iters = b.run(N, ctx);
            t1 = performance.now();
          }
          var total = t1 - t0;
          var ops = total > 0 ? iters / (total / 1000) : 0;
          var r = { op: b.op, iters: iters, total: total, ops: ops };
          results.push(r);
          appendRow(r);
          idx++;
          setTimeout(step, 0); // yield between benchmarks
        }, 24);
      }
      step();
    }

    runBtn.addEventListener("click", run);
  })();
})();
</script>
</body>
